name: Build XMRig ARM64 MUSL

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake build-essential git wget

      - name: Download musl ARM64 toolchain
        run: |
          wget https://github.com/omarDans/moneroocean-xmrig/releases/download/arm64-musl-compiler/aarch64-linux-musl-cross.tgz
          tar xf aarch64-linux-musl-cross.tgz
          echo "PATH=$PWD/aarch64-linux-musl-cross/bin:$PATH" >> $GITHUB_ENV
          
      - name: Set toolchain env
        run: |
          echo "CC=aarch64-linux-musl-gcc" >> $GITHUB_ENV
          echo "CXX=aarch64-linux-musl-g++" >> $GITHUB_ENV
          echo "AR=aarch64-linux-musl-ar" >> $GITHUB_ENV
          echo "RANLIB=aarch64-linux-musl-ranlib" >> $GITHUB_ENV
          
      - name: Build dependencies
        run: |
          cd scripts
          chmod +x build_deps.sh
          CC=aarch64-linux-musl-gcc CXX=aarch64-linux-musl-g++ ./build_deps.sh
          
      - name: Build XMRig for ARM64 MUSL
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_C_COMPILER=aarch64-linux-musl-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-musl-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DXMRIG_DEPS=scripts/deps \
            -DXMRIG_ARCH=arm64 \
            -DWITH_ASM=OFF \
            -DWITH_SSE2=OFF \
            -DWITH_SSSE3=OFF \
            -DWITH_AVX2=OFF \
            -DWITH_AES=OFF
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-arm64-musl
          path: build/xmrig
